kind: Deployment
apiVersion: apps/v1
metadata:
  name: mysql-deploy
  namespace: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql-cont
        image: mysql
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: admin
        - name: MYSQL_DATABASE
          value: testdb
      volumes:
      - name: mysql-volume
        persistentVolumeClaim:
          claimName: mysql-pvc
