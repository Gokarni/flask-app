kind: Deployment
apiVersion: apps/v1
metadata:
  name: flask-deploy
  namespace: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
       app: flask
    spec:
      containers:
      - name: flask-cont
        image: gokarni/frontend
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          value: mysql
        - name: MYSQL_USER
          value: root
        - name: MYSQL_PASSWORD
          value: admin
        - name: MYSQL_DB
          value: testdb
